services:
  - type: worker
    name: anime-poster-bot
    runtime: python
    buildCommand: |
      apt-get install -y libjpeg-dev zlib1g-dev libpng-dev libfreetype6-dev && pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
